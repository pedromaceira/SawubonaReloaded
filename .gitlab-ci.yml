# se definen las etapas que se ejecutarán en orden secuencial
stages:
  - test
  - quality
  - build
  - deploy

image: python:3.13-slim

# se le dice a pip dónde guardar los archivos descargados
variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

# se guarda esa carpeta entre distintos pipelines
cache:
  paths:
    - .cache/pip
  when: always

# ETAPA 1: tests unitarios
run_tests:
  stage: test
  script:
    - echo "Instalando SOLO dependencias ligeras para la lógica..."
    - pip install pytest numpy opencv-python-headless pillow
    - echo "Ejecutando tests de utilidades matemáticas..."
    - pytest tests/test_utils.py

# ETAPA 2: métricas de calidad
check_quality:
  stage: quality
  script:
    - echo "Instalando herramienta de métricas..."
    - pip install radon
    - echo "Analizando la complejidad ciclomática del código..."
    # se analiza la carpeta backend
    # '-s' muestra la nota (A, B, C...) y '-a' muestra la media total.
    - radon cc backend/ -s -a

# ETAPA 3: empaquetado del binario para Linux
build_linux_binario:
  stage: build
  image: python:3.10  # Entorno Python puro con mejor compatibilidad para PyInstaller
  before_script:
    - echo "Instalando dependencias pesadas y PyInstaller (Esto tardará unos minutos)..."
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install pyinstaller
  script:
    - echo "Compilando el ejecutable para Linux..."
    - pyinstaller --name SawubonaServer_Linux --onedir --paths backend --hidden-import uvicorn --hidden-import fastapi --hidden-import pydantic --hidden-import backend.main --hidden-import detector run_server.py
    
    - echo "Recreando la estructura de IA dentro del ejecutable..."
    - mkdir -p dist/SawubonaServer_Linux/backend
    - cp -r backend/modelos dist/SawubonaServer_Linux/backend/
    - cp backend/config.json dist/SawubonaServer_Linux/backend/
    
    - echo "Empaquetando el entregable final..."
    - cd dist
    - tar -czvf SawubonaReloaded_Linux_v1.tar.gz SawubonaServer_Linux/
  artifacts:
    name: "SawubonaReloaded_Linux-$CI_COMMIT_SHORT_SHA"
    paths:
      - dist/SawubonaReloaded_Linux_v1.tar.gz
    expire_in: 1 week

# ETAPA 4: despliegue automático en el CESGA
deploy_server:
  stage: deploy
  tags:
    - cesga-runner
  script:
    - echo "Desplegando localmente desde el interior del CESGA..."
    - module load cesga/system miniconda3
    - source activate sawubona_env
    - export PYTHONPATH=\$STORE/librerias_gpu:\$PYTHONPATH
    - cd ~/usc-sawubonareloaded
    - echo "Forzando sincronización exacta con GitLab..."
    - git fetch origin main
    - git reset --hard origin/main
    - git clean -fd
    - echo "Reiniciando Uvicorn..."
    - pkill -f uvicorn || true
    - nohup uvicorn backend.main:app --host 0.0.0.0 --port 8000 > uvicorn.log 2>&1 &