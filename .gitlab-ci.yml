# se definen las etapas que se ejecutarán en orden secuencial
stages:
  - test
  - quality
  - build
  - deploy

image: python:3.13-slim

# se le dice a pip dónde guardar los archivos descargados
variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

# se guarda esa carpeta entre distintos pipelines
cache:
  paths:
    - .cache/pip
  when: always

# ETAPA 1: tests unitarios
run_tests:
  stage: test
  script:
    - echo "Instalando dependencias desde requirements.txt..."
    - pip install -r requirements.txt
    - echo "Forzando la versión de OpenCV para servidores..."
    - pip uninstall -y opencv-python opencv-python-headless
    - pip install opencv-python-headless==4.13.0.92
    - echo "Ejecutando tests (Omitiendo test_main.py por incompatibilidad de hardware)..."
    - pytest tests/test_utils.py

# ETAPA 2: métricas de calidad
check_quality:
  stage: quality
  script:
    - echo "Instalando herramienta de métricas..."
    - pip install radon
    - echo "Analizando la complejidad ciclomática del código..."
    # se analiza la carpeta backend
    # '-s' muestra la nota (A, B, C...) y '-a' muestra la media total.
    - radon cc backend/ -s -a

# ETAPA 3: empaquetado
build_artifact:
  stage: build
  script:
    - echo "Limpiando archivos innecesarios (como __pycache__)..."
    - find . -name "__pycache__" -exec rm -rf {} +
    - echo "Empaquetando código fuente..."
  artifacts:
    paths:
      - backend/
      - frontend/
    expire_in: 1 week

# ETAPA 4: despliegue al CESGA
deploy_to_cesga:
  stage: deploy
  script:
    - echo "Iniciando despliegue automático en el CESGA..."
    - echo "Aquí irán los comandos SSH para reiniciar el servidor FastAPI"