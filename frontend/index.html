<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sawubona - Análisis de Vídeo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .video-wrapper {
            position: relative;
            width: 100%;
            max-height: 600px; 
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        video {
            max-width: 100%;
            max-height: 600px;
            display: block;
        }
        canvas {
            position: absolute;
            pointer-events: none;
        }
        .scroll-panel { 
            max-height: 500px; 
            overflow-y: auto; 
        }
        .text-id { 
            font-weight: bold; 
            color: #0d6efd; 
        }
        .progress { 
            background-color: #e9ecef; 
            border-radius: 10px; 
        }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">Sawubona Reloaded</span>
            <a href="webcam.html" class="btn btn-outline-info btn-sm">Modo Webcam</a>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <div class="row">
            <div class="col-lg-8 mb-4">
                <div class="card shadow-sm p-3 mb-3">
                    <div class="row g-2">
                        <div class="col-md-9">
                            <input type="file" id="videoInput" accept="video/*" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <button id="btnProcesar" class="btn btn-primary w-100" disabled>Iniciar Análisis</button>
                        </div>
                    </div>
                </div>

                <div class="video-wrapper shadow">
                    <video id="videoPlayer"></video>
                    <canvas id="videoOverlay"></canvas>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">Análisis de Caras</h5>
                        <span id="faceCount" class="badge bg-info text-dark">0 Detectadas</span>
                    </div>
                    <div class="card-body p-0 scroll-panel">
                        <table class="table table-hover mb-0">
                            <thead class="table-secondary">
                                <tr>
                                    <th>ID</th>
                                    <th>Emoción</th>
                                    <th style="width: 40%;">Confianza</th>
                                </tr>
                            </thead>
                            <tbody id="currentFacesTable">
                                <tr>
                                    <td colspan="3" class="text-center text-muted py-4">Sube un vídeo para comenzar</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div id="statusUpdate" class="small text-muted mt-2 text-center"></div>
            </div>
        </div>
    </div>

    <script src="video_processor.js"></script>
</body>
</html>
